<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quizzo Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#9b4dff,#4a6cff);
    font-family:Arial, sans-serif;
}

.container{
    width:340px;
    background:#fff;
    border-radius:18px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h3{
    color:#7b4fe9;
    margin-bottom:20px;
}

.input-box{
    display:flex;
    align-items:center;
    background:#f4f2ff;
    border-radius:30px;
    padding:12px;
    margin-bottom:15px;
}

.input-box input{
    border:none;
    outline:none;
    background:none;
    width:100%;
    font-size:14px;
    margin-left:10px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#c7c7c7;
    color:#fff;
    font-size:16px;
    cursor:not-allowed;
}

button.active{
    background:linear-gradient(135deg,#8e2de2,#4a00e0);
    cursor:pointer;
}

.error{
    color:red;
    font-size:13px;
    margin-top:10px;
}

.links{
    margin-top:15px;
    font-size:13px;
    color:#7b4fe9;
}
</style>
</head>

<body>

<div class="container">
    <h3>LOGIN WITH YOUR ACCOUNT</h3>

    <div class="input-box">
        📧
        <input type="text" id="email" placeholder="Enter your email">
    </div>

    <div class="input-box">
        🔑
        <input type="password" id="password" placeholder="Password">
    </div>

    <button id="loginBtn" disabled>SIGN IN</button>

    <div class="error" id="errorMsg"></div>

    <div class="links">
        Forgot password ? <br><br>
        Create new account ? Click Here
    </div>
</div>

<script>
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const errorMsg = document.getElementById("errorMsg");

// validate inputs
function validate(){
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/;

    if(emailPattern.test(email) && password !== ""){
        loginBtn.disabled = false;
        loginBtn.classList.add("active");
    }else{
        loginBtn.disabled = true;
        loginBtn.classList.remove("active");
    }
}

emailInput.addEventListener("input", validate);
passwordInput.addEventListener("input", validate);

// button click
loginBtn.addEventListener("click", function(){
    if(loginBtn.disabled){
        errorMsg.innerText = "❌ Enter valid email and password";
        return;
    }

    errorMsg.innerText = "";
    // ✅ GO TO NEXT HTML PAGE
    window.location.href = "anjali1.html";
});
</script>

</body>
</html>
