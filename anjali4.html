<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Codehal Quiz</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#2b0040,#000);
    font-family:Arial, sans-serif;
    color:#fff;
}
.quiz-box{
    width:380px;
    background:#12001a;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 20px #ff4da6;
}
h2{
    text-align:center;
    color:#ff4da6;
}
.score{
    text-align:right;
    margin-bottom:10px;
}
.question{
    margin:15px 0;
}
.option{
    border:1px solid #555;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}
.option:hover{
    background:#2a003a;
}
.option.correct{
    background:#1e7f3a;
    border-color:#2aff88;
}
.option.wrong{
    background:#7f1e1e;
    border-color:#ff4d4d;
}
.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}
button{
    padding:8px 20px;
    border:none;
    border-radius:6px;
    background:#555;
    color:#fff;
    cursor:not-allowed;
}
button.active{
    background:#ff4da6;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="quiz-box">
    <h2>Codehal Quiz</h2>
    <div class="score">Score: <span id="score"></span></div>

    <div class="question">
        <strong>2. What does css stand for?</strong>
    </div>

    <div class="option" onclick="selectOption(this,true)">
        A. cascoding style sheet
    </div>
    <div class="option" onclick="selectOption(this,false)">
        B. cute style sheet
    </div>
    <div class="option" onclick="selectOption(this,false)">
        C. computer style sheet
    </div>
    <div class="option" onclick="selectOption(this,false)">
        D. codehal style sheet
    </div>

    <div class="footer">
        <span>1 of 5 Questions</span>
        <button id="nextBtn">Next</button>
    </div>
</div>

<script>
let score = 0;
let answered = false;

function selectOption(element, isCorrect){
    if(answered) return;
    answered = true;

    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.style.pointerEvents = 'none');

    if(isCorrect){
        element.classList.add('correct');
        score++;
        document.getElementById('score').innerText = score;
    }else{
        element.classList.add('wrong');
        options.forEach(opt=>{
            if(opt.innerText.includes("Markup")){
                opt.classList.add('correct');
            }
        });
    }

    const nextBtn = document.getElementById('nextBtn');
    nextBtn.classList.add('active');
    nextBtn.style.cursor = "pointer";
}

/* ✅ NEXT BUTTON → RESULT PAGE */
document.getElementById("nextBtn").onclick = function () {
    if (this.classList.contains("active")) {
        window.location.href = "anjali5.html?score=" + score;
    }
};
</script>

</body>
</html>
