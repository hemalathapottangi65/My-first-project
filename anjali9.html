<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Quiz Button</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    font-family:Arial, sans-serif;
}

/* Circle Button */
.submit-circle{
    width:260px;
    height:260px;
    border-radius:50%;
    background:linear-gradient(to bottom,#f6e27a,#9fe6b8,#6fd6f1);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Inner Button */
.submit-btn{
    padding:18px 35px;
    border:2px solid #ffffff;
    border-radius:12px;
    background:transparent;
    color:#ffffff;
    font-size:26px;
    font-weight:500;
    letter-spacing:2px;
    cursor:pointer;
}

.submit-btn:hover{
    background:rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div class="submit-circle">
    <button class="submit-btn">SUBMIT<br>SUCCESSFULLY</button>
</div>

</body>
</html>
